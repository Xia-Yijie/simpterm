name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          locked: true
      - name: Build
        run: pixi run compile
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: simpterm-${{ matrix.os }}
          path: simpterm
